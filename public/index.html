<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="יומן משמעת מסחר — 30 יום לחודש נקי" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="יומן מסחר" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <title>יומן המשמעת</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0a0a0f; color: #e8e0d0; font-family: 'Noto Serif Hebrew', serif; direction: rtl; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #0a0a0f; }
      ::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 2px; }
      input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #1e1e2e; outline: none; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #c8a96e; cursor: pointer; }
      select option { background: #111118; color: #e8e0d0; }
    </style>
  </head>
  <body>
    <noscript>יש להפעיל JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
